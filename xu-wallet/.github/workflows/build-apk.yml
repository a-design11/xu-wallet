name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Avoid cancelling in-progress runs on the same branch so we don't
# waste partially built caches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      # Restore the full node_modules tree so we can skip `npm ci` entirely on
      # a cache hit. This is the single biggest time saver on warm runs.
      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # gradle/actions/setup-gradle@v4 automatically:
      #   * installs the requested Gradle version (matching
      #     android/gradle/wrapper/gradle-wrapper.properties)
      #   * restores ~/.gradle/caches from GitHub Actions cache
      #   * uploads it again at the end of the job
      #   * configures the Gradle Build Cache backed by GH Actions cache
      # We pin gradle-version to whatever the wrapper expects (currently
      # 9.0.0 after `expo prebuild`) and run read-only on PRs.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Setup Expo & EAS
        run: |
          npm install -g expo@^55.0.8 eas-cli@^13.0.0

      # NOTE: We intentionally do NOT run `expo prebuild` here.
      # The android/ folder is committed to the repo with:
      #   * MainActivity.kt / MainApplication.kt
      #   * gradle-wrapper.jar (generated by `expo prebuild` on the dev box)
      #   * res/ files including splash icons
      #   * debug.keystore + signingConfigs.debug in app/build.gradle
      # The signing config points release builds at the committed
      # debug.keystore, which is also pinned via the SHA-256 check below so
      # we can detect if anyone accidentally regenerates it.

      - name: Verify debug keystore is present
        run: |
          ls -la android/app/debug.keystore
          file android/app/debug.keystore
          # Print the SHA-256 of the keystore so we can tell whether the APK
          # produced by this run matches the keystore recorded in the repo.
          # If you ever see a signature mismatch on install, compare this
          # hash against the keystore that originally signed the installed APK.
          echo "keystore SHA-256:"
          sha256sum android/app/debug.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        working-directory: android
        # --no-daemon is required for ephemeral CI runners, but we keep the
        # build cache (set in gradle.properties + setup-gradle action) so
        # task outputs are reused across runs.
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Verifying signature of $APK"
          ls -la "$APK"
          # Use apksigner (ships with the Android SDK build-tools) to verify
          # the APK. This handles v1/v2/v3 signature schemes properly.
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose --print-certs "$APK" || {
            echo "ERROR: apksigner could not verify $APK" >&2
            exit 1
          }
          echo "APK signature OK"

      - name: Locate generated APK
        working-directory: android
        run: |
          echo "Searching for APK artifacts..."
          find . -path ./node_modules -prune -o -type f \( -name "*.apk" -o -name "*.aab" \) -print | tee apk-paths.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/**/*.apk
            android/**/*.aab
          if-no-files-found: warn
          retention-days: 14
